name: Tag Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.parse.outputs.app_version }}
      build_number: ${{ steps.parse.outputs.build_number }}
      git_tag: ${{ steps.parse.outputs.git_tag }}
    steps:
      - name: Parse tag
        id: parse
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          set -eu
          tag="${GIT_TAG#v}"
          version="${tag%%+*}"
          build_number="${tag#*+}"
          if [ "$build_number" = "$tag" ]; then
            build_number="${GITHUB_RUN_NUMBER}"
          fi
          echo "app_version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "git_tag=$GIT_TAG" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: >
          flutter build apk --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}
          --dart-define=APP_VERSION=${{ needs.prepare.outputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.prepare.outputs.build_number }}
      - name: Build App Bundle
        run: >
          flutter build appbundle --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}
          --dart-define=APP_VERSION=${{ needs.prepare.outputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.prepare.outputs.build_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: xylos-android-${{ needs.prepare.outputs.git_tag }}
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/release/*.aab

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
      - name: Install Linux toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - name: Install dependencies
        run: flutter pub get
      - name: Build Linux
        run: >
          flutter build linux --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}
          --dart-define=APP_VERSION=${{ needs.prepare.outputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.prepare.outputs.build_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: xylos-linux-${{ needs.prepare.outputs.git_tag }}
          path: build/linux/**/release/bundle/**

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows
        run: >
          flutter build windows --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}
          --dart-define=APP_VERSION=${{ needs.prepare.outputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.prepare.outputs.build_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: xylos-windows-${{ needs.prepare.outputs.git_tag }}
          path: build/windows/x64/runner/Release/**

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
      - name: Install dependencies
        run: flutter pub get
      - name: Build macOS
        run: >
          flutter build macos --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}
          --dart-define=APP_VERSION=${{ needs.prepare.outputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.prepare.outputs.build_number }}
      - uses: actions/upload-artifact@v4
        with:
          name: xylos-macos-${{ needs.prepare.outputs.git_tag }}
          path: build/macos/Build/Products/Release/*.app
