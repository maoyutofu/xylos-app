name: Tag Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare Version
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.parse.outputs.app_version }}
      build_number: ${{ steps.parse.outputs.build_number }}
      git_tag: ${{ steps.parse.outputs.git_tag }}
    steps:
      - name: Parse tag
        id: parse
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          set -eu
          tag="${GIT_TAG#v}"
          version="${tag%%+*}"
          build_number="${tag#*+}"
          if [ "$build_number" = "$tag" ]; then
            build_number="${GITHUB_RUN_NUMBER}"
          fi
          echo "app_version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "git_tag=$GIT_TAG" >> "$GITHUB_OUTPUT"

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -eu
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ] && [ -n "${ANDROID_KEYSTORE_PASSWORD:-}" ] && [ -n "${ANDROID_KEY_ALIAS:-}" ] && [ -n "${ANDROID_KEY_PASSWORD:-}" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore
            {
              echo "ANDROID_KEYSTORE_PATH=$GITHUB_WORKSPACE/android/release.keystore"
              echo "ANDROID_KEYSTORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD"
              echo "ANDROID_KEY_ALIAS=$ANDROID_KEY_ALIAS"
              echo "ANDROID_KEY_PASSWORD=$ANDROID_KEY_PASSWORD"
            } >> "$GITHUB_ENV"
          fi
      - name: Install dependencies
        run: flutter pub get
      - name: Build APK
        run: >
          flutter build apk --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}
          --dart-define=APP_VERSION=${{ needs.prepare.outputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.prepare.outputs.build_number }}
      - name: Prepare Android artifacts
        run: |
          set -eu
          mkdir -p build/release/android
          cp build/app/outputs/flutter-apk/*.apk "build/release/android/xylos-${{ needs.prepare.outputs.app_version }}+${{ needs.prepare.outputs.build_number }}.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: xylos-android-${{ needs.prepare.outputs.git_tag }}
          path: build/release/android/*

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
      - name: Install Linux toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev
      - name: Install dependencies
        run: flutter pub get
      - name: Build Linux
        run: >
          flutter build linux --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}
          --dart-define=APP_VERSION=${{ needs.prepare.outputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.prepare.outputs.build_number }}
      - name: Prepare Linux artifact
        run: |
          set -eu
          mkdir -p build/release/linux
          tar -C build/linux/x64/release/bundle -czf "build/release/linux/xylos-${{ needs.prepare.outputs.app_version }}+${{ needs.prepare.outputs.build_number }}-linux-x64.tar.gz" .
      - uses: actions/upload-artifact@v4
        with:
          name: xylos-linux-${{ needs.prepare.outputs.git_tag }}
          path: build/release/linux/*.tar.gz

  build-windows:
    name: Build Windows
    runs-on: windows-2022
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
      - uses: microsoft/setup-msbuild@v2
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop
      - name: Flutter doctor
        run: flutter doctor -v
      - name: Install dependencies
        run: flutter pub get
      - name: Build Windows
        run: >
          flutter build windows --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}
          --dart-define=APP_VERSION=${{ needs.prepare.outputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.prepare.outputs.build_number }}
      - name: Prepare Windows artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/release/windows
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "build/release/windows/xylos-${{ needs.prepare.outputs.app_version }}+${{ needs.prepare.outputs.build_number }}-windows-x64.zip" -Force
      - uses: actions/upload-artifact@v4
        with:
          name: xylos-windows-${{ needs.prepare.outputs.git_tag }}
          path: build/release/windows/*.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.2
      - name: Install dependencies
        run: flutter pub get
      - name: Build macOS
        run: >
          flutter build macos --release
          --build-name=${{ needs.prepare.outputs.app_version }}
          --build-number=${{ needs.prepare.outputs.build_number }}
          --dart-define=APP_VERSION=${{ needs.prepare.outputs.app_version }}
          --dart-define=APP_BUILD_NUMBER=${{ needs.prepare.outputs.build_number }}
      - name: Prepare macOS artifact
        run: |
          set -eu
          mkdir -p build/release/macos
          app_path="$(find build/macos/Build/Products/Release -maxdepth 1 -name '*.app' -type d | head -n 1)"
          test -n "$app_path"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "build/release/macos/xylos-${{ needs.prepare.outputs.app_version }}+${{ needs.prepare.outputs.build_number }}-macos.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: xylos-macos-${{ needs.prepare.outputs.git_tag }}
          path: build/release/macos/*.zip

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-android
      - build-linux
      - build-windows
      - build-macos
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: build/release-assets
      - name: Upload assets to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GIT_TAG: ${{ needs.prepare.outputs.git_tag }}
        run: |
          set -eu
          gh release view "$GIT_TAG" --repo "$GH_REPO" >/dev/null 2>&1 || gh release create "$GIT_TAG" --repo "$GH_REPO" --title "$GIT_TAG" --notes "Release $GIT_TAG"
          mapfile -t files < <(find build/release-assets -type f | sort)
          test "${#files[@]}" -gt 0
          gh release upload "$GIT_TAG" "${files[@]}" --repo "$GH_REPO" --clobber
