plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}

def releaseStoreFile = keystoreProperties.getProperty("storeFile")
if (releaseStoreFile == null || releaseStoreFile.trim().isEmpty()) {
    releaseStoreFile = System.getenv("ANDROID_KEYSTORE_PATH")
}
def releaseStorePassword = keystoreProperties.getProperty("storePassword")
if (releaseStorePassword == null || releaseStorePassword.trim().isEmpty()) {
    releaseStorePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
}
def releaseKeyAlias = keystoreProperties.getProperty("keyAlias")
if (releaseKeyAlias == null || releaseKeyAlias.trim().isEmpty()) {
    releaseKeyAlias = System.getenv("ANDROID_KEY_ALIAS")
}
def releaseKeyPassword = keystoreProperties.getProperty("keyPassword")
if (releaseKeyPassword == null || releaseKeyPassword.trim().isEmpty()) {
    releaseKeyPassword = System.getenv("ANDROID_KEY_PASSWORD")
}
def hasReleaseSigning =
        releaseStoreFile != null && !releaseStoreFile.trim().isEmpty() &&
        releaseStorePassword != null && !releaseStorePassword.trim().isEmpty() &&
        releaseKeyAlias != null && !releaseKeyAlias.trim().isEmpty() &&
        releaseKeyPassword != null && !releaseKeyPassword.trim().isEmpty()

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

def appArtifactName = "xylos"

android {
    namespace = "space.xylos.app"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "space.xylos.app"
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    signingConfigs {
        if (hasReleaseSigning) {
            release {
                storeFile rootProject.file(releaseStoreFile)
                storePassword releaseStorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }

    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig = signingConfigs.release
            }
        }
    }

    applicationVariants.all { variant ->
        variant.outputs.all { output ->
            if (variant.buildType.name == "release") {
                outputFileName = "${appArtifactName}-${variant.versionName}+${variant.versionCode}.apk"
            }
        }
    }
}

flutter {
    source = "../.."
}
